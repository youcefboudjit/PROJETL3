    <div class="main-content">
        
        <header>
            <div class="header-content">
                <label for="menu-toggle">
                    <span class="las la-bars"></span>
                </label>
                
                <div class="header-menu">
                    <label for="">

                    <div class="notify-icon">

        <main>
            
            <div class="page-header">
                <h1>Monitor Empty Sections</h1>
                <small>Overview of section occupancy</small>
            </div>
            
            <div class="page-content">
                <div class="charts">
                    <div class="chart-container">
                        <h3>Section Occupancy</h3>
                        <canvas id="occupancyChart"></canvas>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Section</th>
                            <th>Capacity</th>
                            <th>Occupied</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Section A</td>
                            <td>30</td>
                            <td>25</td>
                            <td>Occupied</td>
                        </tr>
                        <tr>
                            <td>Section B</td>
                            <td>30</td>
                            <td>0</td>
                            <td>Empty</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
        </main>
        
    </div>
    <script>
        const ctx = document.getElementById('occupancyChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Occupied', 'Empty'],
                datasets: [{
                    data: [25, 5],
                    backgroundColor: ['#7380ec', '#ff7782']
                }]
            }
        });
    </script>
    <script src="script.js"></script>
